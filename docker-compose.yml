services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ids-backend:latest
    container_name: ids-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    image: ids-frontend:latest
    container_name: ids-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
