name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "github-actions"

          git clone https://huggingface.co/spaces/YOUR_USERNAME/YOUR_SPACE_NAME hf-space
          rsync -av --exclude=".git" ./ hf-space/

          cd hf-space
          git add .
          git commit -m "Sync from GitHub" || echo "No changes to commit"
          git push https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/YOUR_USERNAME/ids-backend
