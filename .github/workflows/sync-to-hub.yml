name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "github-actions"

          # ✅ AUTHENTICATED CLONE (fixed)
          git clone https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend hf-space

          # copy files
          rsync -av --exclude=".git" --exclude=".github" ./ hf-space/

          cd hf-space
          git add .

          # commit (safe if no changes)
          git commit -m "Sync from GitHub" || echo "No changes to commit"

          # ✅ PUSH (this was missing in your version)
          git push https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend
