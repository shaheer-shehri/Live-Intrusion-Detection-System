name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git clone https://shaheershehri:$HF_TOKEN@huggingface.co/spaces/shaheershehri/AI_project_backend hf-space

          # Wipe HF repo content (keep .git), then copy fresh from GitHub checkout
          cd hf-space
          git rm -rf . --quiet 2>/dev/null || true
          cd ..

          cp -r $(pwd)/. hf-space/
          rm -rf hf-space/.git-bak
          rm -rf hf-space/.github

          cd hf-space
          git add -A
          git diff --staged --quiet || git commit -m "Sync from GitHub $(git -C .. rev-parse --short HEAD 2>/dev/null || echo latest)"
          git push https://shaheershehri:$HF_TOKEN@huggingface.co/spaces/shaheershehri/AI_project_backend HEAD:main