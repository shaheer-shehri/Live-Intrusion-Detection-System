name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Clone the Hugging Face Space repo
          git clone https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend hf-space

          # Copy files (exclude git and github dirs)
          rsync -av --exclude=".git" --exclude=".github" ./ hf-space/

          cd hf-space
          git add .

          # Commit (safe if no changes)
          git commit -m "Sync from GitHub" || echo "No changes to commit"

          # Push to main branch (FIXED: was missing branch name)
          git push https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend main
