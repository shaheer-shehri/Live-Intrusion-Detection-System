name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          api.upload_folder(
              folder_path=".",
              repo_id="shaheershehri/AI_project_backend",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=[
                  ".git",
                  ".git/**",
                  ".github",
                  ".github/**",
                  "**/__pycache__/**",
                  "**/*.pyc",
                  ".env",
                  ".env.local",
                  "frontend/**",
                  "*.ai_venv/**",
              ],
          )
          print("Upload complete!")
          EOF
