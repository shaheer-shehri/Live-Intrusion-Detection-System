name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Clone HF Space with token auth
          git clone https://shaheershehri:$HF_TOKEN@huggingface.co/spaces/shaheershehri/AI_project_backend hf-space

          # Sync files (exclude git internals)
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ hf-space/

          cd hf-space

          git add -A
          git commit -m "Sync from GitHub" || echo "No changes"

          git push https://shaheershehri:$HF_TOKEN@huggingface.co/spaces/shaheershehri/AI_project_backend HEAD:main