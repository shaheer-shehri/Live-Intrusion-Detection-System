name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Clone the Hugging Face Space repo
          git clone https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend hf-space

          # Copy everything except .git
          cd ..
          python3 << 'EOF'
          import shutil
          import os
          from pathlib import Path

          src = Path(".")
          dst = Path("hf-space")
          
          # Copy all files and directories
          ignore_patterns = [".git", ".github", "__pycache__", ".pytest_cache", "*.pyc", "venv", "node_modules", ".gitmodules"]
          
          def should_ignore(path):
              name = path.name
              return any(pattern in str(path) for pattern in ignore_patterns)
          
          for item in src.iterdir():
              if item.name == "hf-space" or should_ignore(item):
                  continue
              
              dst_item = dst / item.name
              if item.is_dir():
                  if dst_item.exists():
                      shutil.rmtree(dst_item)
                  shutil.copytree(item, dst_item, ignore=lambda d, files: [f for f in files if should_ignore(Path(d) / f)])
              else:
                  dst_item.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(item, dst_item)
          EOF

          cd hf-space
          git add -A
          git commit -m "Sync from GitHub" || echo "No changes to commit"
          git push origin main
