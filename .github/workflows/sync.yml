name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Clone the Hugging Face Space repo
          git clone https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend hf-space

          # Sync files (rsync preserves directory structure and handles symlinks)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='venv' \
            --exclude='node_modules' \
            ./ hf-space/
          
          cd hf-space
          git add .
          git commit -m "Sync from GitHub" || echo "No changes to commit"
          git push https://sharjeel24:$HF_TOKEN@huggingface.co/spaces/sharjeel24/ids-backend main
