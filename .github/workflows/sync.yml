name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Clone HF repo using proper auth header method
          git clone https://huggingface.co/spaces/sharjeel24/ids-backend hf-space

          # Sync files properly (safe + standard)
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ hf-space/

          cd hf-space

          git add -A
          git commit -m "Sync from GitHub" || echo "No changes"

          # IMPORTANT: use credential helper style push
          git push https://huggingface.co/spaces/sharjeel24/ids-backend HEAD:main