name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git clone https://shaheershehri:$HF_TOKEN@huggingface.co/spaces/shaheershehri/AI_project_backend /tmp/hf-space

          # Wipe HF repo content (keep .git)
          cd /tmp/hf-space
          git rm -rf . --quiet 2>/dev/null || true

          # Copy from GitHub checkout (GITHUB_WORKSPACE is outside /tmp, no self-copy issue)
          cp -r $GITHUB_WORKSPACE/. /tmp/hf-space/
          rm -rf /tmp/hf-space/.github

          git add -A
          git diff --staged --quiet || git commit -m "Sync from GitHub: $GITHUB_SHA"
          git push --force https://shaheershehri:$HF_TOKEN@huggingface.co/spaces/shaheershehri/AI_project_backend HEAD:main